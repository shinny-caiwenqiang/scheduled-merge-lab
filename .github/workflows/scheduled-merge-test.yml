name: Scheduled merge test

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  merge-test-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Merge target PR by number if ready
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: shinny-caiwenqiang/scheduled-merge-lab
          PR_NUMBER: "9"
        run: |
          set -euo pipefail
          echo "Event: ${{ github.event_name }}"
          echo "Current UTC: $(date -u -Iseconds)"
          echo "Target PR: #$PR_NUMBER"

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft,mergeStateStatus,state,url)"
          echo "$pr_json"

          state="$(echo "$pr_json" | jq -r ".state")"
          is_draft="$(echo "$pr_json" | jq -r ".isDraft")"
          merge_state="$(echo "$pr_json" | jq -r ".mergeStateStatus")"

          if [ "$state" != "OPEN" ] || [ "$is_draft" = "true" ]; then
            echo "PR is not open or is draft, skipping."
            exit 0
          fi

          if [ "$merge_state" != "CLEAN" ] && [ "$merge_state" != "HAS_HOOKS" ] && [ "$merge_state" != "UNKNOWN" ]; then
            echo "PR merge state is $merge_state, skipping."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPO" --rebase --delete-branch
